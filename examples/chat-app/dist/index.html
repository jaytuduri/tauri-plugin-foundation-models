<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Intelligence Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #d2d2d7;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --user-bg: #0071e3;
      --user-fg: #ffffff;
      --ai-bg: #e9e9eb;
      --ai-fg: #1d1d1f;
      --accent: #0071e3;
      --radius: 18px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --surface: #2c2c2e;
        --border: #3a3a3c;
        --text: #f2f2f7;
        --muted: #8e8e93;
        --ai-bg: #3a3a3c;
        --ai-fg: #f2f2f7;
      }
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text);
                 font-size: 15px; -webkit-font-smoothing: antialiased; }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #8e8e93; flex-shrink: 0; transition: background 0.3s;
    }
    .status-dot.ready { background: #30d158; }
    .status-dot.busy  { background: #ff9f0a; }
    .status-dot.error { background: #ff3b30; }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    #status-label { font-size: 12px; color: var(--muted); margin-left: auto; -webkit-app-region: no-drag; }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .bubble-row { display: flex; }
    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.ai   { justify-content: flex-start; }
    .bubble {
      max-width: 72%; padding: 10px 14px; border-radius: var(--radius);
      line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    }
    .bubble-row.user .bubble { background: var(--user-bg); color: var(--user-fg); border-bottom-right-radius: 4px; }
    .bubble-row.ai   .bubble { background: var(--ai-bg);   color: var(--ai-fg);   border-bottom-left-radius:  4px; }
    .bubble.streaming::after {
      content: "▋"; animation: blink 0.8s step-start infinite; margin-left: 1px; opacity: 0.6;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .notice { text-align: center; font-size: 12px; color: var(--muted); padding: 8px 0; }
    .notice.error-notice { color: #ff3b30; }

    /* ── Input bar ── */
    #input-bar {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border);
    }
    #prompt {
      flex: 1; resize: none; border: 1px solid var(--border); border-radius: 20px;
      padding: 9px 16px; font-family: var(--font); font-size: 15px; color: var(--text);
      background: var(--bg); outline: none; max-height: 140px; overflow-y: auto;
      line-height: 1.5; transition: border-color 0.15s;
    }
    #prompt:focus { border-color: var(--accent); }
    #send-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:disabled { opacity: 0.35; cursor: default; }
    #send-btn:not(:disabled):active { transform: scale(0.93); }
    #send-btn svg { pointer-events: none; }
  </style>
  <script type="module" crossorigin src="/assets/index-DnaYw931.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <span class="status-dot" id="dot"></span>
      <h1>Apple Intelligence</h1>
      <span id="status-label">Checking availability…</span>
    </header>

    <div id="messages"></div>

    <div id="input-bar">
      <textarea id="prompt" rows="1" placeholder="Message…" disabled></textarea>
      <button id="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 13V3M3 8l5-5 5 5" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</body>
</html>
