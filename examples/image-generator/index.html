<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Intelligence Image Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #d2d2d7;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --surface: #2c2c2e;
        --border: #3a3a3c;
        --text: #f2f2f7;
        --muted: #8e8e93;
      }
    }

    html, body {
      height: 100%; font-family: var(--font); background: var(--bg);
      color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased;
    }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* Header */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #8e8e93; flex-shrink: 0; transition: background 0.3s;
    }
    .status-dot.ready { background: #30d158; }
    .status-dot.busy  { background: #ff9f0a; }
    .status-dot.error { background: #ff3b30; }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    #status-label { font-size: 12px; color: var(--muted); margin-left: auto; -webkit-app-region: no-drag; }

    /* Prompt area */
    #prompt-area {
      padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
      -webkit-app-region: no-drag;
    }

    #controls { display: flex; gap: 10px; align-items: flex-end; }

    #prompt {
      flex: 1; resize: none; border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 14px; font-family: var(--font); font-size: 15px; color: var(--text);
      background: var(--bg); outline: none; max-height: 100px; overflow-y: auto;
      line-height: 1.5; transition: border-color 0.15s;
    }
    #prompt:focus { border-color: var(--accent); }

    .options-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    label { font-size: 13px; color: var(--muted); white-space: nowrap; }

    select, input[type="number"] {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; font-family: var(--font); font-size: 13px;
      color: var(--text); background: var(--bg); outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type="number"]:focus { border-color: var(--accent); }
    input[type="number"] { width: 60px; }

    #generate-btn {
      padding: 8px 18px; border-radius: 20px; border: none;
      background: var(--accent); color: #fff; font-family: var(--font);
      font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s, background 0.15s;
    }
    #generate-btn:disabled { opacity: 0.35; cursor: default; }
    #generate-btn:not(:disabled):hover { background: var(--accent-hover); }
    #generate-btn:not(:disabled):active { transform: scale(0.97); }

    /* Gallery */
    #gallery-wrap { flex: 1; overflow-y: auto; padding: 20px; }

    #notice {
      text-align: center; font-size: 13px; color: var(--muted);
      padding: 12px 0;
    }
    #notice.error { color: #ff3b30; }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .img-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

    .img-card img {
      width: 100%; display: block; aspect-ratio: 1;
      object-fit: cover; background: var(--bg);
    }

    .img-card .img-label {
      padding: 6px 10px; font-size: 12px; color: var(--muted); text-align: center;
    }

    .placeholder-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="status-dot" id="dot"></span>
      <h1>Apple Intelligence</h1>
      <span id="status-label">Checking availability…</span>
    </header>

    <div id="prompt-area">
      <div class="options-row">
        <label for="style-select">Style</label>
        <select id="style-select" disabled>
          <option value="">Default</option>
        </select>

        <label for="count-input">Count</label>
        <input type="number" id="count-input" value="1" min="1" max="4" disabled />
      </div>

      <div id="controls">
        <textarea id="prompt" rows="2" placeholder="Describe an image…" disabled></textarea>
        <button id="generate-btn" disabled>Generate</button>
      </div>
    </div>

    <div id="gallery-wrap">
      <div id="notice">Apple Intelligence image generation requires macOS 26+.</div>
      <div id="gallery"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
